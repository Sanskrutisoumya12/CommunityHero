<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>
<body>
<h1>🔑 Reset Password</h1>
{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    <p>New Password</p>
    <input
        type="password"
        id="new_password"
        name="new_password"
        required
    >
    <p>Confirm Password</p>
    <input
        type="password"
        id="confirm_password"
        name="confirm_password"
        required
    >
    <br><br>
    <input
        type="checkbox"
        onclick="togglePasswords()"
    >
    Show Passwords
    <br><br>
    <button type="submit">
        Reset Password
    </button>
</form>
<script>
function togglePasswords() {
    let fields = [
        "new_password",
        "confirm_password"
    ];
    fields.forEach(function(id) {
        let field =
            document.getElementById(id);
        if (field.type === "password") {
            field.type = "text";
        } else {
            field.type = "password";
        }
    });
}
</script>
</body>
</html>
