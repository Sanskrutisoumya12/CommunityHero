<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
</head>
<body>
<h2>Email Verification OTP</h2>
{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    <label>
        Enter 6-digit OTP
    </label>
    <br><br>
    <input
        type="text"
        name="otp"
        maxlength="6"
        required
    >
    <br><br>
    <button type="submit">
        Verify OTP
    </button>
</form>
</body>
</html>
