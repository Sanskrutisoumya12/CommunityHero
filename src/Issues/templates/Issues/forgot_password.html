<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

<h1>Forgot Password</h1>

<p>
    Enter your email address.
</p>

<form method="post">

    {% csrf_token %}

    <input
        type="email"
        name="email"
        placeholder="Enter your email"
        required
    >

    <button type="submit">
        Continue
    </button>

</form>

</body>
</html>
